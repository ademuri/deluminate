<!doctype html>
<html>
  <head>
    <title>Light Site with Query</title>
    <style>
      body {
        background-color: white;
        color: black;
      }
      @media (prefers-color-scheme: dark) {
        body {
          background-color: #222;
          color: #eee;
        }
      }
    </style>
  </head>
  <body>
    <h1>This is a light site</h1>
    <p>It has some dark text here on a white background.</p>
  </body>
</html>
