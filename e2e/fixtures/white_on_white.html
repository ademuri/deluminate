<!doctype html>
<html>
  <head>
    <style>
      body {
        margin: 0;
        background-color: white;
      }
      .bg-layer {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: white;
        z-index: 1;
      }
      .content {
        position: relative;
        z-index: 2;
        color: black;
        padding: 20px;
        font-size: 24px;
      }
    </style>
  </head>
  <body>
    <div class="bg-layer" role="img"></div>
    <div class="content">This text must be readable</div>
  </body>
</html>
