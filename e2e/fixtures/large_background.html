<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: white;
      font-family: sans-serif;
    }
    .bg-layer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: url("bg.webp");
      background-size: cover;
      z-index: -1;
    }
    .content {
      color: black;
      font-size: 24px;
      padding: 20px;
      position: relative;
    }
    .profile-photo {
      background-image: url('photo.jpg');
      width: 100px;
      height: 100px;
      border-radius: 50%;
    }
  </style>
</head>
<body>
  <div class="bg-layer"></div>
  <div class="content">
    <h1>Large background re-inversion test</h1>
    <p>This text should be readable (black on white background originally).</p>
    <div class="profile-section">
      <div class="profile-photo" role="img" aria-label="Profile Photo"></div>
      <span>Content Image (should look natural)</span>
    </div>
    <p>In dark mode, it should be white on black.</p>
    <p>Large background elements should not be un-inverted to avoid white-on-white text.</p>
  </div>
</body>
</html>
